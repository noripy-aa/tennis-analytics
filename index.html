<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テニスアナリティクス v13.2 (Firebaseワイド修正版)</title>
    <style>
        :root {
            --primary: #1e3a8a; --primary-light: #3b82f6; --secondary: #10b981;
            --danger: #ef4444; --dark: #1f2937; --light: #f3f4f6; --accent: #f59e0b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; padding-bottom: 80px; }
        header { background: linear-gradient(135deg, #1e3a8a, #3b82f6); color: white; padding: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h1 { font-size: 26px; font-weight: 700; letter-spacing: 1px; }
        
        /* PC大画面に対応した本来のワイドコンテナ */
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .card { background: #1e293b; border-radius: 12px; padding: 25px; margin-bottom: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 1px solid #334155; }
        .card-title { font-size: 19px; font-weight: bold; margin-bottom: 20px; border-left: 5px solid var(--primary-light); padding-left: 12px; color: #3b82f6; }
        
        /* フォームレイアウト（横並び対応） */
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .form-group { margin-bottom: 0; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #94a3b8; font-weight: 600; }
        input, select { width: 100%; padding: 12px; border: 1px solid #475569; background: #0f172a; color: white; border-radius: 8px; font-size: 16px; }
        input:focus, select:focus { outline: none; border-color: var(--primary-light); }
        
        /* ボタン */
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s; text-align: center; }
        .btn-primary { background: var(--primary-light); color: white; }
        .btn-primary:hover { background: #2563eb; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-accent { background: var(--accent); color: white; }
        
        /* ダッシュボード（グリッドで横に綺麗に並べる） */
        .resume-section { background: #2d1e10; border: 1px solid var(--accent); border-radius: 12px; padding: 20px; margin-bottom: 25px; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; margin-top: 15px; }
        .resume-card, .data-card { display: flex; justify-content: space-between; align-items: center; background: #0f172a; padding: 15px; border-radius: 8px; border: 1px solid #334155; }
        .card-info { font-size: 14px; line-height: 1.6; color: #cbd5e1; }
        .action-btn { padding: 8px 16px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; background: var(--primary-light); color: white; }
        
        /* スコアボード（ワイド表示用） */
        .score-board { display: grid; grid-template-columns: 3fr 1.5fr 1.5fr; gap: 12px; background: #0f172a; padding: 20px; border-radius: 10px; border: 1px solid #334155; text-align: center; margin-bottom: 20px; }
        .score-header { font-size: 13px; color: #94a3b8; font-weight: bold; text-transform: uppercase; padding-bottom: 5px; }
        .score-row { display: contents; }
        .score-cell { padding: 15px 0; font-size: 22px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .pname-cell { justify-content: flex-start; padding-left: 20px; font-size: 18px; color: #f1f5f9; }
        .pt-live { color: #10b981; font-size: 28px; }
        
        /* ミニステータス */
        .mini-status { display: flex; justify-content: space-around; background: #1e293b; padding: 12px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #334155; font-size: 14px; color: #cbd5e1; }
        .mini-status span strong { color: #3b82f6; }

        /* 入力エリアの配置 */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        
        /* 選択式ボタン */
        .select-btn { background: #334155; color: #cbd5e1; border: 2px solid transparent; padding: 16px 12px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: all 0.15s; }
        .select-btn:active { transform: scale(0.98); }
        .select-btn.selected { background: #1e3a8a; color: white; border-color: #3b82f6; box-shadow: 0 0 12px rgba(59,130,246,0.5); }
        .btn-playerA.selected, .btn-playerB.selected { background: #1e3a8a; border-color: #3b82f6; }
        
        /* ログ・コンソール */
        .log-box { background: #0f172a; padding: 15px; border-radius: 8px; min-height: 54px; display: flex; align-items: center; color: #cbd5e1; font-size: 15px; border: 1px solid #334155; margin-bottom: 20px; font-family: monospace; }
        
        /* タブ */
        .tab-menu { display: flex; background: #0f172a; border-radius: 8px; padding: 4px; margin-bottom: 20px; border: 1px solid #334155; }
        .tab-btn { flex: 1; padding: 12px; background: transparent; color: #94a3b8; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 15px; }
        .tab-btn.active { background: #334155; color: white; }
        
        /* テーブル・集計表 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 15px; text-align: center; }
        th, td { padding: 12px; border: 1px solid #334155; }
        th { background: #0f172a; color: #94a3b8; }
        td strong { color: #f1f5f9; }
        .table-container { overflow-x: auto; background: #0f172a; padding: 15px; border-radius: 8px; border: 1px solid #334155; }
        
        /* フッターナビ */
        footer { position: fixed; bottom: 0; left: 0; width: 100%; background: #1e293b; border-top: 1px solid #334155; padding: 12px; display: flex; justify-content: center; box-shadow: 0 -4px 10px rgba(0,0,0,0.4); z-index: 100; }
        .nav-btn { max-width: 1160px; width: 100%; padding: 14px; font-size: 16px; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <h1>🎾 TENNIS ANALYTICS</h1>
    </header>

    <div class="container">
        
        <div id="screen-home" class="card">
            <div id="resume-section-area" class="resume-section hidden">
                <h3 style="color:var(--accent); font-size:16px;">⚠️ 進行中の試合があります</h3>
                <div id="resume-list" class="dashboard-grid"></div>
            </div>

            <div class="card-title">新規マッチ作成</div>
            <div class="form-row">
                <div class="form-group">
                    <label>試合日</label>
                    <input type="date" id="match-date">
                </div>
                <div class="form-group">
                    <label>Player A (手前)</label>
                    <input type="text" id="name-playerA" value="ヤマノリ" placeholder="Player A">
                </div>
                <div class="form-group">
                    <label>Player B (奥)</label>
                    <input type="text" id="name-playerB" value="親寅" placeholder="Player B">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>試合形式</label>
                    <select id="match-format">
                        <option value="6">6ゲームマッチ</option>
                        <option value="4">4ゲームマッチ</option>
                        <option value="1set">1セットマッチ(通常)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>ノーアド規則</label>
                    <select id="match-rule">
                        <option value="normal">デュースあり</option>
                        <option value="no-ad">ノーアドバンテージ</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-primary" onclick="startNewMatch()" style="margin-top:15px; max-width: 300px;">試合開始 🔥</button>

            <div class="card-title" style="margin-top:40px;">📊 保存済みの対戦履歴</div>
            <div id="history-list" class="dashboard-grid"></div>

            <div class="card-title" style="margin-top:40px;">👤 選手別通算データ</div>
            <div id="player-stats-list" class="dashboard-grid"></div>
        </div>
